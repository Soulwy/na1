<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер книг</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Трекер книг</h1>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
                <button class="btn-add" id="addBookBtn" type="button">+ Добавить книгу</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalBooks">0</div>
                <div class="stat-label">Всего книг</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedBooks">0</div>
                <div class="stat-label">Прочитано</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="progressPercent">0%</div>
                <div class="stat-label">Средний прогресс</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgSpeed">—</div>
                <div class="stat-label">Скорость чтения</div>
            </div>
        </div>

        <div class="filter-bar">
            <select id="filterStatus" class="filter-select">
                <option value="all">📚 Все книги</option>
                <option value="reading">📖 Читаю</option>
                <option value="completed">✅ Прочитано</option>
                <option value="postponed">⏸ Отложено</option>
            </select>
        </div>

        <div id="booksList" class="books-grid"></div>
    </div>

    <button class="fab" id="fabBtn" type="button">+</button>

    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Добавить книгу</h2>
                <span class="close" role="button" aria-label="Закрыть">&times;</span>
            </div>

            <form id="bookForm">
                <input type="hidden" id="bookId">

                <input type="text" id="title" placeholder="Название книги" required>
                <input type="text" id="author" placeholder="Автор">
                <input type="number" id="totalPages" placeholder="Всего страниц" min="1" required>
                <input type="number" id="readPages" placeholder="Прочитано страниц" min="0" value="0">

                <select id="status">
                    <option value="reading">📖 Читаю</option>
                    <option value="completed">✅ Прочитано</option>
                    <option value="postponed">⏸ Отложено</option>
                </select>

                <input type="date" id="startDate">
                <input type="number" id="dailyGoal" placeholder="Цель в день">
                
                <label class="checkbox-label">
                    <input type="checkbox" id="isFavorite">
                    ⭐ В избранное
                </label>

                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Сохранить</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Отмена</button>
                </div>
            </form>
        </div>
    </div>

        <script src="js/bookModel.js"></script>
        <script src="js/storage.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/app.js"></script>
</body>
</html>
